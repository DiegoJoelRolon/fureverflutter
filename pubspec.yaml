name: fureverflutter
description: "Furever Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^19.4.0  

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.7

  # State management
  provider: ^6.1.2

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # Freezed + Json
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.0
  freezed: ^3.1.0
  json_serializable: ^6.11.0

flutter:
  uses-material-design: true